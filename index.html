<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome | Bono Region Youth Parliament Ghana</title>
    <link rel="stylesheet" href="css/style.css">

    
</head>
<body class="welcome-page">
    <div class="welcome-container">
        <div class="welcome-card">
            <div class="logos">
                <img src="images/logos/logo1.png" alt="Youth Parliament Logo" onerror="this.src='https://via.placeholder.com/80x80?text=Logo1'">
                <img src="images/logos/logo2.png" alt="Bono Region Logo" onerror="this.src='https://via.placeholder.com/80x80?text=Logo2'">
            </div>
            
            <h1>BONO REGION YOUTH PARLIAMENT GHANA</h1>
            
            <div class="welcome-image">
                <img src="images/heroes/welcome-bg.jpg" alt="Bono Region Youth" onerror="this.src='https://via.placeholder.com/800x400?text=Bono+Region+Youth'">
            </div>
            
            <div class="slogan-container">
                <p class="slogan">"Empowering Youth, Building Bono"</p>
                <p class="sub-slogan">Voice of the Youth, Strength of the Region</p>
            </div>
            
            <a href="main.html" class="enter-btn">
                Enter Website <i class="fas fa-arrow-right"></i>
            </a>
            
            <div class="flags">
                <span class="flag green"></span>
                <span class="flag gold"></span>
                <span class="flag red"></span>
            </div>
        </div>
    </div>
</body>
</html>
